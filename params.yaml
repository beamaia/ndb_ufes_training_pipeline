project: multiclass
run_name: ""

stages:
  train: true
  test: true
  origin_test: false

dataset:
  root: data
  patch: ndb_ufes/patch_level/images
  origin: ndb_ufes/origin_level/images
  fold_assignments_path: data/ndb_ufes/patch_level/csvs/fold_assignments_patch_level_with_images.csv
  cv_folds: [0, 1, 2, 3, 4]
  test_fold: 5

training:
  mode: finetune # expected options [finetune, frozen_head]

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001
  mode: all

experiment:
  models:
    - mobilenetv2
    - densenet121
    - resnet50

hyperparameters:
  optimizer:
    name: sgd
    learning_rate: 0.001
    momentum: 0.9
  scheduler:
    name: reduce_lr_on_plateau
    other:
      # factor: 0.1
      # patience: 10
      mode: min
      factor: 0.1
      patience: 10
      min_lr: 0.000001
  model:
    name: resnet50
    other:
  other:
    loss: cross_entropy
    loss_weights: true
    folds: 5
    epochs: 150
    batch_size: 30
    train_type: cross_validation

device: mps
node_type: float32

